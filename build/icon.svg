<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e1b4b"/>
      <stop offset="1" stop-color="#312e81"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#1e1b4b" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- rounded app background -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- POS terminal -->
  <g filter="url(#shadow)">
    <!-- terminal body -->
    <rect x="250" y="300" width="524" height="470" rx="44" fill="#ffffff"/>
    <!-- screen -->
    <rect x="306" y="356" width="412" height="220" rx="24" fill="url(#screen)"/>

    <!-- peso sign on screen -->
    <text x="512" y="510" font-family="Segoe UI, Arial, sans-serif" font-size="180"
          font-weight="700" fill="#a5b4fc" text-anchor="middle">&#8369;</text>

    <!-- keypad buttons -->
    <g fill="#c7d2fe">
      <rect x="330" y="620" width="100" height="56" rx="16"/>
      <rect x="462" y="620" width="100" height="56" rx="16"/>
      <rect x="594" y="620" width="100" height="56" rx="16"/>
      <rect x="330" y="700" width="100" height="56" rx="16"/>
      <rect x="462" y="700" width="100" height="56" rx="16"/>
    </g>
    <!-- enter / pay key -->
    <rect x="594" y="700" width="100" height="56" rx="16" fill="#22c55e"/>
  </g>

  <!-- receipt curling out the top -->
  <g filter="url(#shadow)">
    <rect x="372" y="160" width="280" height="190" rx="14" fill="#f8fafc"/>
    <g stroke="#94a3b8" stroke-width="12" stroke-linecap="round">
      <line x1="410" y1="206" x2="614" y2="206"/>
      <line x1="410" y1="246" x2="560" y2="246"/>
    </g>
    <!-- barcode -->
    <g fill="#1e293b">
      <rect x="410" y="292" width="10" height="34"/>
      <rect x="430" y="292" width="6"  height="34"/>
      <rect x="446" y="292" width="14" height="34"/>
      <rect x="470" y="292" width="6"  height="34"/>
      <rect x="484" y="292" width="10" height="34"/>
      <rect x="504" y="292" width="6"  height="34"/>
      <rect x="518" y="292" width="16" height="34"/>
      <rect x="544" y="292" width="6"  height="34"/>
      <rect x="558" y="292" width="10" height="34"/>
      <rect x="578" y="292" width="14" height="34"/>
      <rect x="602" y="292" width="6"  height="34"/>
    </g>
  </g>
</svg>
